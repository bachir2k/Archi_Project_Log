<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${categorieActuelle != null ? categorieActuelle.nom + ' - Actualites' : 'Actualites'}">Actualités</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<main class="conteneur">
    <h1 th:if="${categorieActuelle == null}">Derniers articles</h1>
    <h1 th:if="${categorieActuelle != null}" th:text="'Categorie : ' + ${categorieActuelle.nom}">Categorie</h1>

    <p th:if="${#lists.isEmpty(articles)}" class="vide">Aucun article pour le moment.</p>

    <article class="carte-article" th:each="article : ${articles}">
        <h2><a th:href="@{'/articles/' + ${article.id}}" th:text="${article.titre}">Titre</a></h2>
        <p class="meta" th:if="${article.categorieNom}" th:text="${article.categorieNom}">Categorie</p>
        <p th:text="${article.description}">Description</p>
    </article>

    <nav class="pagination">
        <a th:if="${page > 0}"
           th:href="@{${categorieActuelle != null ? '/categories/' + categorieActuelle.id : '/'}(page=${page - 1})}">
            ← Précédent
        </a>
        <a th:if="${hasNext}"
           th:href="@{${categorieActuelle != null ? '/categories/' + categorieActuelle.id : '/'}(page=${page + 1})}">
            Suivant →
        </a>
    </nav>
</main>

</body>
</html>
